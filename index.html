<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>UBC Course Maps | 课程关系图</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-K9QJVJJ7SH"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-K9QJVJJ7SH');</script>
<style>
:root{--bg:#0d1117;--cbg:#161b22;--bd:#30363d;--tx:#c9d1d9;--t2:#8b949e;--ac:#58a6ff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;max-width:1050px;padding:40px 24px;width:100%}
h1{font-size:2.2rem;margin-bottom:6px;font-weight:800}
.grad{background:linear-gradient(135deg,#58a6ff,#c297ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:0.9rem;color:var(--t2);margin-bottom:48px}
.blocks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px}
.block{background:var(--cbg);border:1px solid var(--bd);border-radius:18px;padding:40px 24px;text-align:center;transition:all 0.25s;text-decoration:none;color:var(--tx);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px}
.block:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.block-icon{font-size:3.5rem;margin-bottom:14px;display:block}
.block-title{font-size:1.2rem;font-weight:700;margin-bottom:8px}
.block-desc{font-size:0.8rem;color:var(--t2);line-height:1.5}
.coming-soon{display:inline-block;background:rgba(139,92,246,0.15);color:#a371f7;font-size:0.7rem;padding:4px 12px;border-radius:20px;margin-top:12px;font-weight:600}

@media (max-width: 900px) {
  .blocks{grid-template-columns:1fr 1fr;gap:16px}
  .block{padding:32px 20px;min-height:220px}
  .block-icon{font-size:2.8rem}
}
@media (max-width: 600px) {
  .blocks{grid-template-columns:1fr;gap:16px}
  h1{font-size:1.5rem}
  .block{padding:28px 20px;min-height:180px}
  .block-icon{font-size:2.5rem}
  .block-title{font-size:1.1rem}
}
</style>
</head>
<body>
<div class="wrap">
<h1 class="grad">UBC Course Maps</h1>
<p class="sub">Interactive prerequisite diagrams · Bilingual EN/ZH · 12 Departments</p>
<div class="blocks">
<a class="block" href="pages/cpen_program.html" style="border-top:3px solid #7c3aed">
  <span class="block-icon">🎯</span>
  <div class="block-title">按专业选课</div>
  <div class="block-desc">根据你的专业和学位要求，<br>查看推荐课程路径与修课计划</div>
  <span class="coming-soon">11 Programs · 12 Depts · Co-op</span>
</a>
<a class="block" href="pages/subjects.html" style="border-top:3px solid #2ea043">
  <span class="block-icon">📚</span>
  <div class="block-title">按学科选课</div>
  <div class="block-desc">按院系和学科浏览所有课程，<br>查看前置关系与课程依赖图</div>
</a>
<a class="block" href="pages/coop_info.html" style="border-top:3px solid #f0883e">
  <span class="block-icon">💼</span>
  <div class="block-title">Co-op 带薪实习</div>
  <div class="block-desc">Engineering & Science Co-op<br>申请流程、资格要求与求职指南</div>
</a>
</div>
</div>
</body>
</html>
