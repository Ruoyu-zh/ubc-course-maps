<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBC Course Scheduler | 自动排课工具</title>
<style>
  :root { --bg: #0d1117; --card-bg: #161b22; --border: #30363d; --text: #c9d1d9; --text2: #8b949e; --accent: #58a6ff; --danger: #f85149; --success: #3fb950; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  .container { max-width: 1300px; margin: 0 auto; padding: 24px; }
  h1 { text-align: center; font-size: 1.8rem; padding: 20px 0 8px; background: linear-gradient(135deg, #58a6ff, #3fb950); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { text-align: center; color: var(--text2); margin-bottom: 24px; font-size: 0.9rem; }

  .layout { display: grid; grid-template-columns: 420px 1fr; gap: 24px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  /* Input panel */
  .panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .panel h2 { font-size: 1.1rem; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  .quick-input { width: 100%; min-height: 120px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-family: 'Consolas', monospace; font-size: 0.85rem; resize: vertical; }
  .quick-input::placeholder { color: var(--text2); }
  .hint { font-size: 0.75rem; color: var(--text2); margin-top: 6px; line-height: 1.5; }

  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 12px; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 0.75rem; }

  .course-list { margin-top: 16px; }
  .course-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 6px; margin-bottom: 6px; font-size: 0.85rem; }
  .course-item .code { font-weight: 700; color: var(--accent); min-width: 100px; }
  .course-item .time { color: var(--text2); flex: 1; }
  .course-item .del { color: var(--danger); cursor: pointer; font-weight: 700; padding: 2px 6px; }
  .conflict-badge { background: rgba(248,81,73,0.15); color: var(--danger); padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }

  /* Timetable */
  .timetable { display: grid; grid-template-columns: 60px repeat(5, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .tt-header { background: var(--card-bg); padding: 8px; text-align: center; font-weight: 700; font-size: 0.8rem; color: var(--text2); }
  .tt-time { background: var(--card-bg); padding: 4px 8px; text-align: right; font-size: 0.7rem; color: var(--text2); display: flex; align-items: center; justify-content: flex-end; }
  .tt-cell { background: var(--card-bg); min-height: 36px; padding: 2px; position: relative; transition: all 0.15s; }
  .tt-course { padding: 4px 6px; border-radius: 4px; font-size: 0.7rem; margin: 1px 0; cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .tt-course.conflict { border: 2px solid var(--danger); }
  .tt-course:hover { opacity: 0.85; }

  .legend-row { display: flex; gap: 12px; margin-top: 12px; font-size: 0.75rem; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }

  /* Solutions */
  .solution-bar { margin-top: 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .solution-tag { padding: 6px 14px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border); cursor: pointer; font-size: 0.82rem; }
  .solution-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .solution-tag.conflict-tag { border-color: var(--danger); color: var(--danger); }

  .summary { font-size: 0.82rem; color: var(--text2); margin-top: 8px; }
</style>
</head>
<body>
<div class="container">

<h1>📅 UBC 自动排课工具</h1>
<p class="subtitle">输入课程编号和上课时间 → 自动检测冲突 → 生成最优课表</p>

<div class="layout">
  <!-- LEFT: Input -->
  <div>
    <div class="panel">
      <h2>📝 添加课程</h2>
      <textarea class="quick-input" id="courseInput" placeholder="每行一门课，格式：
CPSC 221 201 MWF 10:00-11:00
PHYS 301 101 MWF 11:00-12:00
MATH 215 201 TTh 9:30-11:00
STAT 251 202 TTh 14:00-15:30
ELEC 201 101 MWF 13:00-14:00

格式说明：课号 课号 section 周几 开始-结束
周几: M=周一 T=周二 W=周三 Th=周四 F=周五
      MWF=周一三五  TTh=周二四"></textarea>
      <div class="hint">
        💡 从 Workday 复制课程时间，按上面格式粘贴即可。也可以手动输入。
      </div>
      <button class="btn btn-primary" onclick="parseAndRender()">🔍 解析并生成课表</button>
    </div>

    <div class="panel" style="margin-top:16px;">
      <h2>📋 已加载课程 <span id="courseCount" style="color:var(--text2)">(0)</span></h2>
      <div class="course-list" id="courseList">
        <div style="color:var(--text2);font-size:0.85rem;">等待输入...</div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Timetable -->
  <div>
    <div class="panel">
      <h2>📊 周课表</h2>
      <div class="timetable" id="timetable"></div>
      <div class="legend-row" id="legend"></div>
    </div>
    <div id="solutionArea"></div>
    <div class="summary" id="summary"></div>
  </div>
</div>

</div>

<script>
const COLORS = ['#58a6ff','#3fb950','#d29922','#f85149','#a371f7','#56d4dd','#f97583','#7ee787','#c297ff','#ffab70','#79c0ff','#f2cc60'];
const DAY_MAP = {'M':'Mon','T':'Tue','W':'Wed','Th':'Thu','F':'Fri'};
const DAY_ORDER = ['Mon','Tue','Wed','Thu','Fri'];
const HOUR_START = 8, HOUR_END = 21;

let courses = [];

function parseTime(str) {
  // Parse "10:00" or "14:30"
  let [h,m] = str.split(':').map(Number);
  return h*60 + (m||0);
}

function parseDays(str) {
  let days = [];
  let i = 0;
  while (i < str.length) {
    if (str[i] === 'T' && str[i+1] === 'h') { days.push('Thu'); i+=2; }
    else if (str[i] === 'T') { days.push('Tue'); i+=1; }
    else if (str[i] === 'M') { days.push('Mon'); i+=1; }
    else if (str[i] === 'W') { days.push('Wed'); i+=1; }
    else if (str[i] === 'F') { days.push('Fri'); i+=1; }
    else { i++; }
  }
  return days;
}

function parseAndRender() {
  const raw = document.getElementById('courseInput').value.trim();
  courses = [];
  const lines = raw.split('\n').filter(l => l.trim());

  for (let line of lines) {
    line = line.trim();
    // Parse: DEPT NUM SECTION DAYS START-END
    // e.g. "CPSC 221 201 MWF 10:00-11:00"
    let parts = line.split(/\s+/);
    if (parts.length < 5) continue;

    let dept = parts[0];
    let num = parts[1];
    let section = parts[2];
    let daysStr = parts[3];
    let timeStr = parts.slice(4).join(''); // "10:00-11:00"

    let [startStr, endStr] = timeStr.split('-');
    if (!startStr || !endStr) continue;

    let start = parseTime(startStr);
    let end = parseTime(endStr);
    let days = parseDays(daysStr);

    let code = dept + ' ' + num;
    courses.push({ code, section, days, start, end, colorIdx: courses.length });
  }

  renderAll();
}

function timeOverlap(a, b) {
  for (let da of a.days) {
    for (let db of b.days) {
      if (da === db) {
        if (a.start < b.end && b.start < a.end) return true;
      }
    }
  }
  return false;
}

function findConflicts() {
  let conflicts = new Set();
  for (let i = 0; i < courses.length; i++) {
    for (let j = i+1; j < courses.length; j++) {
      if (timeOverlap(courses[i], courses[j])) {
        conflicts.add(i);
        conflicts.add(j);
      }
    }
  }
  return conflicts;
}

function renderAll() {
  let conflicts = findConflicts();
  renderTimetable(conflicts);
  renderCourseList(conflicts);
  document.getElementById('courseCount').textContent = `(${courses.length})`;
  document.getElementById('summary').innerHTML = conflicts.size > 0
    ? `<span style="color:var(--danger)">⚠️ 发现 ${conflicts.size} 门课有时间冲突！请调整时间。</span>`
    : `<span style="color:var(--success)">✅ 所有课程无冲突，课表完美！</span>`;
}

function renderTimetable(conflicts) {
  let html = '<div class="tt-header"></div>';
  for (let d of DAY_ORDER) html += `<div class="tt-header">${d}</div>`;

  // Build slot map: for each 30-min slot, what courses occupy it
  let slots = {};
  for (let d of DAY_ORDER) {
    slots[d] = {};
    for (let h = HOUR_START*60; h < HOUR_END*60; h += 30) {
      slots[d][h] = [];
    }
  }

  for (let i = 0; i < courses.length; i++) {
    let c = courses[i];
    for (let d of c.days) {
      for (let t = c.start; t < c.end; t += 30) {
        if (slots[d] && slots[d][t] !== undefined) {
          slots[d][t].push(i);
        }
      }
    }
  }

  // Build cell content
  let hourLabels = [];
  let cellContent = {};
  for (let d of DAY_ORDER) cellContent[d] = {};

  for (let h = HOUR_START; h < HOUR_END; h++) {
    hourLabels.push(`${h}:00`);
    let hmin = h*60;
    for (let d of DAY_ORDER) {
      cellContent[d][hmin] = slots[d][hmin] || [];
    }
  }

  for (let hi = 0; hi < hourLabels.length; hi++) {
    html += `<div class="tt-time">${hourLabels[hi]}</div>`;
    for (let d of DAY_ORDER) {
      let hmin = (HOUR_START + hi)*60;
      let cellCourses = slots[d][hmin] || [];
      // Only show course tag at the START of each course block
      let tags = [];
      for (let ci of cellCourses) {
        let c = courses[ci];
        if (c.start === hmin) {
          // Find how many 30-min slots this course spans
          let slots_count = Math.ceil((c.end - c.start) / 30);
          let isConflict = conflicts.has(ci);
          let color = COLORS[ci % COLORS.length];
          tags.push(`<div class="tt-course${isConflict ? ' conflict' : ''}" style="background:${color}22;border-left:3px solid ${color};color:var(--text)" title="${c.code} ${c.section}">${c.code} ${c.section}</div>`);
        }
      }
      html += `<div class="tt-cell">${tags.join('')}</div>`;
    }
  }

  document.getElementById('timetable').innerHTML = html;

  // Legend
  let legendHtml = '';
  for (let i = 0; i < courses.length; i++) {
    let c = courses[i];
    let color = COLORS[i % COLORS.length];
    legendHtml += `<span><span class="legend-dot" style="background:${color}"></span>${c.code} ${c.section} ${c.days.join('/')} ${fmtTime(c.start)}-${fmtTime(c.end)}</span>`;
  }
  document.getElementById('legend').innerHTML = legendHtml || '暂无课程';
}

function fmtTime(mins) {
  let h = Math.floor(mins/60), m = mins%60;
  return `${h}:${m.toString().padStart(2,'0')}`;
}

function renderCourseList(conflicts) {
  let html = '';
  for (let i = 0; i < courses.length; i++) {
    let c = courses[i];
    let isConflict = conflicts.has(i);
    let color = COLORS[i % COLORS.length];
    html += `<div class="course-item">
      <span class="code" style="color:${color}">${c.code} ${c.section}</span>
      <span class="time">${c.days.join('/')} ${fmtTime(c.start)}-${fmtTime(c.end)}</span>
      ${isConflict ? '<span class="conflict-badge">冲突</span>' : ''}
      <span class="del" onclick="removeCourse(${i})" title="删除">✕</span>
    </div>`;
  }
  document.getElementById('courseList').innerHTML = html || '<div style="color:var(--text2);font-size:0.85rem;">暂无课程</div>';
}

function removeCourse(idx) {
  courses.splice(idx, 1);
  renderAll();
}

// Preload example
document.getElementById('courseInput').value = `CPSC 221 201 MWF 10:00-11:00
PHYS 301 101 MWF 11:00-12:00
MATH 215 201 TTh 9:30-11:00
STAT 251 202 TTh 11:00-12:30
ELEC 201 101 MWF 13:00-14:00`;
parseAndRender();
</script>
</body></html>
